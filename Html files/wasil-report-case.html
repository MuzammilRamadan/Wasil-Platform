<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wasil - Report Case</title>
    <link rel="stylesheet" href="../Css files/wasil-home.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Supabase SDK -->

    <style>
        body {
            background: var(--bg-page);
            padding: 20px;
            min-height: 100vh;
        }

        .report-card {
            background: var(--white);
            border-radius: var(--radius-2xl);
            padding: 24px;
            box-shadow: var(--shadow-md);
            max-width: 500px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.9rem;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #E2E8F0;
            border-radius: var(--radius-lg);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-xl);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .header-row {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="report-card">
        <div class="header-row">
            <a href="wasil-home.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Cancel
            </a>
            <h2 style="flex: 1; text-align: center; margin: 0; padding-right: 60px;">Report Case</h2>
        </div>

        <form id="reportForm">
            <div class="form-group">
                <label class="form-label">Disease Suspected</label>
                <select class="form-select" id="disease" required>
                    <option value="">Select Disease</option>
                    <option value="Cholera">Cholera</option>
                    <option value="Typhoid">Typhoid</option>
                    <option value="Dengue Fever">Dengue Fever</option>
                    <option value="Malaria">Malaria</option>
                    <option value="Unknown">Unknown / Other</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Severity</label>
                <select class="form-select" id="severity" required>
                    <option value="low">Low (Mild Symptoms)</option>
                    <option value="moderate">Moderate</option>
                    <option value="high">High (Needs Attention)</option>
                    <option value="critical">Critical (Immediate Help)</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Location</label>
                <input type="text" class="form-input" id="location" placeholder="e.g. Omdurman, Block 12..." required>
            </div>

            <div class="form-group">
                <label class="form-label">Description / Symptoms</label>
                <textarea class="form-textarea" id="description" rows="4"
                    placeholder="Describe symptoms and situation..."></textarea>
            </div>

            <div class="form-group">
                <button type="submit" class="btn-submit" id="submitBtn">Submit Report</button>
            </div>
        </form>
    </div>

    <!-- Toast Notification (Reusing style from home) -->
    <div id="toast"
        style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 12px 24px; border-radius: 50px; opacity: 0; transition: all 0.3s;">
        Report Submitted!
    </div>

    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../Js files/supabase-config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            // Check session
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'wasil-login.html';
                return;
            }

            const form = document.getElementById('reportForm');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                submitBtn.disabled = true;
                submitBtn.textContent = 'Submitting...';

                const disease = document.getElementById('disease').value;
                const severity = document.getElementById('severity').value;
                const location = document.getElementById('location').value;
                const description = document.getElementById('description').value;

                try {
                    const { error } = await supabase
                        .from('cases')
                        .insert({
                            disease,
                            severity,
                            location,
                            description,
                            reporter_id: session.user.id
                        });

                    if (error) throw error;

                    showToast();
                    setTimeout(() => {
                        window.location.href = 'wasil-home.html';
                    }, 1500);

                } catch (error) {
                    console.error('Error reporting case:', error);
                    alert('Error: ' + error.message);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Report';
                }
            });

            function showToast() {
                const toast = document.getElementById('toast');
                toast.style.transform = 'translateX(-50%) translateY(0)';
                toast.style.opacity = '1';
            }
        });
    </script>
</body>

</html>
