<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description"
        content="WASIL - Report an epidemic case in your area to help health authorities respond faster.">
    <title>WASIL | Report a Case</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../Js files/supabase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563EB;
            --teal: #0E7490;
            --bg: #F1F5F9;
            --white: #FFFFFF;
            --text: #1E293B;
            --text-light: #64748B;
            --border: #E2E8F0;
            --radius: 14px;
            --radius-sm: 8px;
            --critical: #EF4444;
            --high: #F59E0B;
            --moderate: #3B82F6;
            --low: #10B981;
            --success: #10B981;
            --error: #EF4444;
        }

        body {
            font-family: 'Cairo', 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            padding-bottom: 32px;
        }

        /* Header */
        .page-header {
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 6px 8px;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
            font-family: inherit;
        }

        .back-btn:hover {
            background: var(--bg);
            color: var(--text);
        }

        .page-header h1 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        /* Main */
        .report-main {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* Info Banner */
        .info-banner {
            background: rgba(37, 99, 235, 0.06);
            border: 1px solid rgba(37, 99, 235, 0.15);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .info-banner svg {
            flex-shrink: 0;
            margin-top: 2px;
        }

        .info-banner p {
            font-size: 0.82rem;
            line-height: 1.5;
            color: #1D4ED8;
        }

        /* Form Sections */
        .form-section {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .optional-badge {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-light);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* Disease Grid */
        .disease-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .disease-option input {
            display: none;
        }

        .disease-card {
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-light);
        }

        .disease-option input:checked+.disease-card {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.06);
            color: var(--primary);
        }

        .disease-emoji {
            display: none;
        }

        /* Severity Options */
        .severity-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .severity-option input {
            display: none;
        }

        .sev-card {
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sev-card span {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text);
        }

        .sev-card small {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .sev-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-bottom: 4px;
        }

        .severity-option.critical .sev-dot {
            background: var(--critical);
        }

        .severity-option.high .sev-dot {
            background: var(--high);
        }

        .severity-option.moderate .sev-dot {
            background: var(--moderate);
        }

        .severity-option.low .sev-dot {
            background: var(--low);
        }

        .severity-option.critical input:checked+.sev-card {
            border-color: var(--critical);
            background: rgba(239, 68, 68, 0.05);
        }

        .severity-option.high input:checked+.sev-card {
            border-color: var(--high);
            background: rgba(245, 158, 11, 0.05);
        }

        .severity-option.moderate input:checked+.sev-card {
            border-color: var(--moderate);
            background: rgba(59, 130, 246, 0.05);
        }

        .severity-option.low input:checked+.sev-card {
            border-color: var(--low);
            background: rgba(16, 185, 129, 0.05);
        }

        /* Form Inputs */
        .form-group {
            margin-bottom: 14px;
        }

        .form-label {
            display: block;
            font-size: 0.83rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.92rem;
            font-family: inherit;
            color: var(--text);
            background: var(--white);
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .char-count {
            display: block;
            text-align: right;
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #0E7490, #2563EB);
            color: white;
            border: none;
            padding: 15px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
            margin-top: 6px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(37, 99, 235, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin-icon {
            animation: spin 0.9s linear infinite;
        }

        /* Toast */
        .wasil-toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1E293B;
            color: white;
            padding: 12px 22px;
            border-radius: 50px;
            font-size: 0.88rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 9999;
            pointer-events: none;
        }

        .wasil-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Notification */
        .wasil-notif {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-size: 0.88rem;
            font-weight: 600;
            z-index: 10000;
            max-width: 300px;
            animation: slideIn 0.3s ease;
            font-family: inherit;
        }

        @keyframes slideIn {
            from {
                transform: translateX(200%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="page-header">
        <button class="back-btn" onclick="history.back()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            <span data-i18n="report.back">Back</span>
        </button>
        <h1 data-i18n="report.title">Report a Case</h1>
        <div style="width:64px;"></div>
    </header>

    <!-- Toast -->
    <div class="wasil-toast" id="toastMsg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span data-i18n="report.success">Case reported successfully!</span>
    </div>

    <main class="report-main">

        <!-- Info Banner -->
        <div class="info-banner">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <p data-i18n="report.info">Your report helps health authorities deploy mobile clinics faster. All reports
                are confidential.</p>
        </div>

        <form id="reportForm" novalidate>

            <!-- Disease -->
            <div class="form-section">
                <h2 class="section-title" data-i18n="report.sec_disease">Suspected Disease</h2>
                <div class="disease-grid" id="diseaseGridContainer">
                    <div style="grid-column: 1 / -1; text-align: center; color: var(--text-light); padding: 20px;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin-icon">
                            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>
                        </svg>
                    </div>
                </div>
                <div id="otherDiseaseGroup" style="display:none;margin-top:12px;">
                    <input type="text" id="otherDisease" class="form-input" placeholder="Enter disease name..."
                        data-i18n-placeholder="report.other_disease_ph">
                </div>
            </div>


            <!-- Location -->
            <div class="form-section">
                <h2 class="section-title" data-i18n="report.sec_location">Your Location</h2>
                <div class="form-group">
                    <label class="form-label" data-i18n="report.area">Area / Neighborhood</label>
                    <select id="locationArea" class="form-input" required>
                        <option value="" disabled selected data-i18n="report.select_area">Select your area...</option>
                        <option value="Khartoum North" data-i18n="area.khartoum_north">Khartoum North</option>
                        <option value="Omdurman" data-i18n="area.omdurman">Omdurman</option>
                        <option value="Bahri" data-i18n="area.bahri">Bahri</option>
                        <option value="Jabarona" data-i18n="area.jabarona">Jabarona</option>
                        <option value="Haj Yousif" data-i18n="area.haj_yousif">Haj Yousif</option>
                        <option value="Sharg Al-Neel" data-i18n="area.sharg_alneel">Sharg Al-Neel</option>
                        <option value="Khartoum Center" data-i18n="area.khartoum_center">Khartoum Center</option>
                        <option value="Soba" data-i18n="area.soba">Soba</option>
                        <option value="__other__" data-i18n="report.other_area">Other area...</option>
                    </select>
                </div>
                <div id="otherLocationGroup" style="display:none;margin-top:12px;">
                    <label class="form-label" data-i18n="report.location_specify">Specify Location</label>
                    <input type="text" id="otherLocation" class="form-input" placeholder="Enter your area or address..."
                        data-i18n-placeholder="report.location_ph">
                </div>
                <!-- Specific address text input -->
                <div class="form-group" style="margin-top:12px;margin-bottom:0;">
                    <label class="form-label"><span data-i18n="report.specific_address">Specific Address / Block</span>
                        <span style="color:var(--text-light);font-weight:400;"
                            data-i18n="report.optional">(optional)</span></label>
                    <input type="text" id="specificAddress" class="form-input"
                        placeholder="e.g. Block 7, near the school..."
                        data-i18n-placeholder="report.specific_address_ph">
                </div>
            </div>

            <!-- Description -->
            <div class="form-section">
                <h2 class="section-title"><span data-i18n="report.sec_desc">Description</span> <span
                        class="optional-badge" data-i18n="report.optional">Optional</span></h2>
                <div class="form-group" style="margin-bottom:0;">
                    <label class="form-label" data-i18n="report.symptoms">Symptoms & Details</label>
                    <textarea id="description" class="form-input form-textarea" maxlength="300"
                        placeholder="Describe symptoms, number of people affected, any relevant details..."
                        data-i18n-placeholder="report.symptoms_ph"></textarea>
                    <span class="char-count" id="charCount">0 / 300</span>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="button-text" data-i18n="report.submit">Submit Report</span>
                <span class="button-loader" style="display:none;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        class="spin-icon">
                        <path
                            d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83">
                        </path>
                    </svg>
                    <span data-i18n="report.submitting">Submitting...</span>
                </span>
            </button>

        </form>
    </main>

    <script src="../Js files/wasil-i18n.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {

            // ── AUTH CHECK ──
            if (window.supabase) {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session && !sessionStorage.getItem('demo_mode')) {
                    window.location.href = 'wasil-login.html';
                    return;
                }
            }

            // ── LOAD DISEASES DYNAMICALLY ──
            const gridContainer = document.getElementById('diseaseGridContainer');
            if (gridContainer && window.supabase) {
                try {
                    const { data: diseases, error } = await supabase.from('diseases').select('*').eq('is_active', true).order('created_at', { ascending: true });
                    let diseaseList = diseases;
                    if (error || !diseases || diseases.length === 0) {
                        diseaseList = [
                            {name: 'Cholera', default_severity: 'critical'},
                            {name: 'Typhoid', default_severity: 'high'},
                            {name: 'Dengue Fever', default_severity: 'moderate'},
                            {name: 'Malaria', default_severity: 'low'}
                        ];
                    }
                    
                    gridContainer.innerHTML = diseaseList.map((d, i) => {
                        const lname = d.name.toLowerCase();
                        let iconPath = '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>';
                        let colorVar = 'var(--text-light)';
                        const sev = d.default_severity || 'moderate';
                        if (sev === 'critical') colorVar = 'var(--critical)';
                        else if (sev === 'high') colorVar = 'var(--high)';
                        else if (sev === 'moderate') colorVar = 'var(--moderate)';
                        else if (sev === 'low') colorVar = '#10B981'; // stable
                        
                        if (lname.includes('cholera')) iconPath = '<circle cx="12" cy="12" r="3"></circle><path d="M12 2v3M12 19v3M2 12H5M19 12h3"></path><path d="M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"></path>';
                        else if (lname.includes('typhoid')) iconPath = '<path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path>';
                        else if (lname.includes('dengue')) iconPath = '<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>';
                        else if (lname.includes('malaria')) iconPath = '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M9 12l2 2 4-4"></path>';
                        
                        return `
                        <label class="disease-option">
                            <input type="radio" name="disease" value="${d.name}" ${i === 0 ? 'required' : ''}>
                            <div class="disease-card">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="disease-icon" style="color:${colorVar};margin-bottom:4px;">
                                    ${iconPath}
                                </svg>
                                <span>${d.name}</span>
                            </div>
                        </label>`;
                    }).join('') + `
                    <label class="disease-option">
                        <input type="radio" name="disease" value="Unknown">
                        <div class="disease-card">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="disease-icon" style="color:var(--text-light);margin-bottom:4px;">
                                <circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line>
                            </svg>
                            <span data-i18n="dis.unknown">Unknown</span>
                        </div>
                    </label>
                    <label class="disease-option">
                        <input type="radio" name="disease" value="__other__">
                        <div class="disease-card">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="disease-icon" style="color:var(--text-light);margin-bottom:4px;">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                            <span data-i18n="dis.other">Other</span>
                        </div>
                    </label>`;

                    // ── DISEASE "Other" toggle ──
                    document.querySelectorAll('input[name="disease"]').forEach(radio => {
                        radio.addEventListener('change', function () {
                            document.getElementById('otherDiseaseGroup').style.display =
                                this.value === '__other__' ? 'block' : 'none';
                        });
                    });
                } catch (e) {
                    console.error("Error loading diseases", e);
                }
            }

            // ── LOCATION "Other" toggle ──
            document.getElementById('locationArea').addEventListener('change', function () {
                document.getElementById('otherLocationGroup').style.display =
                    this.value === '__other__' ? 'block' : 'none';
            });

            // ── CHARACTER COUNT ──
            const descriptionField = document.getElementById('description');
            const charCount = document.getElementById('charCount');
            descriptionField.addEventListener('input', function () {
                charCount.textContent = `${this.value.length} / 300`;
                charCount.style.color = this.value.length > 270 ? '#EF4444' : 'var(--text-light)';
            });

            // ── FORM SUBMISSION ──
            const form = document.getElementById('reportForm');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                // Get values
                const diseaseRadio = document.querySelector('input[name="disease"]:checked');
                const severityRadio = document.querySelector('input[name="severity"]:checked');
                const locationArea = document.getElementById('locationArea').value;
                const otherDisease = document.getElementById('otherDisease').value.trim();
                const otherLocation = document.getElementById('otherLocation').value.trim();
                const specificAddress = document.getElementById('specificAddress').value.trim();
                const description = document.getElementById('description').value.trim();

                // Validation
                if (!diseaseRadio) {
                    showNotification('Please select a suspected disease.', 'error');
                    return;
                }
                if (!locationArea) {
                    showNotification('Please select your area.', 'error');
                    return;
                }

                let disease = diseaseRadio.value === '__other__' ? (otherDisease || 'Other') : diseaseRadio.value;
                let location = locationArea === '__other__' ? (otherLocation || 'Other area') : locationArea;
                if (specificAddress) location += `, ${specificAddress}`;

                // Loading state
                const btnText = submitBtn.querySelector('.button-text');
                const btnLoader = submitBtn.querySelector('.button-loader');
                submitBtn.disabled = true;
                btnText.style.display = 'none';
                btnLoader.style.display = 'inline-flex';

                try {
                    if (window.supabase) {
                        const { data: { user } } = await supabase.auth.getUser();

                        // Compute severity from existing case count for this disease
                        const { count: existingCount } = await supabase
                            .from('cases')
                            .select('id', { count: 'exact', head: true })
                            .ilike('disease', disease);
                        const totalCount = (existingCount || 0) + 1;
                        let computedSeverity = 'low';
                        if (totalCount >= 61)      computedSeverity = 'critical';
                        else if (totalCount >= 31) computedSeverity = 'high';
                        else if (totalCount >= 11) computedSeverity = 'moderate';

                        const { error } = await supabase
                            .from('cases')
                            .insert({
                                disease,
                                severity: computedSeverity,
                                location,
                                description: description || null,
                                reporter_id: user ? user.id : null
                            });

                        if (error) throw error;
                    }

                    // Show success
                    const toast = document.getElementById('toastMsg');
                    toast.classList.add('show');
                    setTimeout(() => {
                        window.location.href = 'wasil-home.html';
                    }, 1600);

                } catch (err) {
                    console.error('Report error:', err);
                    showNotification('Failed to submit: ' + (err.message || 'Unknown error'), 'error');
                    submitBtn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoader.style.display = 'none';
                }
            });

            function showNotification(msg, type) {
                const existing = document.querySelector('.wasil-notif');
                if (existing) existing.remove();
                const n = document.createElement('div');
                n.className = 'wasil-notif';
                n.textContent = msg;
                n.style.background = type === 'error' ? '#EF4444' : '#10B981';
                document.body.appendChild(n);
                setTimeout(() => n.remove(), 3000);
            }
        });
    </script>
</body>

</html>
