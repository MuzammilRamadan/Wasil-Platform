<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasil - Select Role</title>
    <link rel="stylesheet" href="../Css files/wasil-roleselect.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../Js files/supabase-config.js"></script>
</head>

<body>
    <div class="role-container">
        <!-- Back to Language -->
        <a href="wasil-language.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </a>
        <h1 class="role-title" data-i18n="role.title">How will you use WASIL?</h1>

        <div class="role-cards">
            <!-- Community Member Card -->
            <div class="role-card" id="card-community">
                <div class="role-icon community-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </div>
                <h2 class="role-card-title" data-i18n="role.community">Community Member</h2>
                <p class="role-card-desc" data-i18n="role.community_desc">Report cases, find nearby clinics, and access
                    health instructions.</p>
                <div class="role-arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
            </div>

            <!-- Organization Card -->
            <div class="role-card" id="card-organization">
                <div class="role-icon org-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                        <line x1="9" y1="6" x2="9" y2="6.01"></line>
                        <line x1="15" y1="6" x2="15" y2="6.01"></line>
                        <line x1="9" y1="10" x2="9" y2="10.01"></line>
                        <line x1="15" y1="10" x2="15" y2="10.01"></line>
                        <line x1="9" y1="14" x2="9" y2="14.01"></line>
                        <line x1="15" y1="14" x2="15" y2="14.01"></line>
                        <line x1="9" y1="18" x2="15" y2="18"></line>
                    </svg>
                </div>
                <h2 class="role-card-title" data-i18n="role.organization">Organization</h2>
                <p class="role-card-desc" data-i18n="role.organization_desc">Assign clinics, provide services, and
                    manage epidemic response.</p>
                <div class="role-arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
            </div>

            <!-- System Admin Card -->
            <div class="role-card" id="card-admin">
                <div class="role-icon admin-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"></path>
                        <path d="M9 12l2 2 4-4"></path>
                    </svg>
                </div>
                <h2 class="role-card-title" data-i18n="role.admin">System Admin</h2>
                <p class="role-card-desc" data-i18n="role.admin_desc">Manage the epidemic response system, review clinic
                    requests, and monitor all users.</p>
                <div class="role-arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script src="../Js files/wasil-i18n.js"></script>
    <script src="../Js files/wasil-roleselect.js"></script>
</body>

</html>
